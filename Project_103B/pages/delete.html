<!DOCTYPE html>

<body>

        </div>

        <div class="form-header">
            <h3>Xác nhận</h3>
        </div>
        
        <div class="form-body">
            <p class="delete-message">
                Bạn có chắc chắn muốn xóa môn học <strong>Lập trình cơ bản Frontend Fundamental</strong> khỏi hệ thống không?
            </p>
        </div>

        <div class="form-actions">
            <button type="button" class="btn-cancel">Hủy</button>
            <button type="button" class="btn-delete-confirm">Xóa</button>
        </div>
    </div>
</div>
</body>
