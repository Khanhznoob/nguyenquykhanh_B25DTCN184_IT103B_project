<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập</title>
  <link rel="stylesheet" href="../css/login.css" />
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <script>
    const user = JSON.parse(localStorage.getItem('currentUser')) || JSON.parse(sessionStorage.getItem('currentUser'));

    if (user) {
      window.location.href = './subject.html';
    }
  </script>
</head>

<body>
  <div class="login-container">
    <div class="header">
      <h2>Đăng nhập</h2>
      <p>Đăng nhập tài khoản để sử dụng hệ thống quản lý.</p>
    </div>

    <form action="#" method="POST">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" />
        <span id="error-email" class="error-message"></span>
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" name="password" />
        <span id="error-password" class="error-message"></span>
      </div>

      <div class="form-options">
        <div class="checkbox-group">
          <input type="checkbox" id="remember" name="remember" />
          <label for="remember">Nhớ tài khoản</label>
        </div>
        <a href="#" class="forgot-password">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="submit-btn">Đăng nhập</button>
    </form>

    <div class="footer">
      <span>Bạn chưa có tài khoản?</span> <a href="./index.html">Đăng ký</a>
    </div>
  </div>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script src="../js/login.js"></script>
</body>

</html>
